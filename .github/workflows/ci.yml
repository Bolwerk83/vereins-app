name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: enterprise-report
    steps:
      - uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: enterprise-report/package-lock.json

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Tests (node --test)
        run: npm test

      - name: Build
        run: npm run build
