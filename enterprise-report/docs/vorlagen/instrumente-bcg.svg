<svg xmlns="http://www.w3.org/2000/svg" width="720" height="540" viewBox="0 0 720 540" font-family="Segoe UI, Arial, sans-serif">
  <rect width="720" height="540" fill="#F4F6F9"/>
  <text x="32" y="40" font-size="20" font-weight="700" fill="#1F2A37">Controlling-Instrument · BCG-Portfolio</text>
  <text x="32" y="62" font-size="12.5" fill="#64748B">Produktgruppen nach Marktwachstum × relativem Marktanteil (Blasengröße = Umsatz).</text>

  <!-- Quadranten -->
  <rect x="80" y="84" width="290" height="180" fill="#FBF1E5"/>
  <rect x="370" y="84" width="290" height="180" fill="#E7F3EC"/>
  <rect x="80" y="264" width="290" height="180" fill="#FBEAEA"/>
  <rect x="370" y="264" width="290" height="180" fill="#E6F2F0"/>
  <line x1="370" y1="84" x2="370" y2="444" stroke="#D7DEE6" stroke-dasharray="4 3"/>
  <line x1="80" y1="264" x2="660" y2="264" stroke="#D7DEE6" stroke-dasharray="4 3"/>
  <rect x="80" y="84" width="580" height="360" fill="none" stroke="#D7DEE6"/>

  <text x="92" y="104" font-size="12" font-weight="700" fill="#B45309">Question Mark</text>
  <text x="648" y="104" font-size="12" font-weight="700" fill="#15803D" text-anchor="end">Star</text>
  <text x="92" y="436" font-size="12" font-weight="700" fill="#B91C1C">Poor Dog</text>
  <text x="648" y="436" font-size="12" font-weight="700" fill="#0F766E" text-anchor="end">Cash Cow</text>

  <text x="370" y="468" font-size="11" fill="#64748B" text-anchor="middle">relativer Marktanteil →</text>
  <text x="60" y="264" font-size="11" fill="#64748B" text-anchor="middle" transform="rotate(-90 60 264)">Marktwachstum % →</text>

  <!-- Blasen -->
  <g>
    <circle cx="560" cy="150" r="30" fill="#15803D" opacity="0.55" stroke="#15803D"/><text x="560" y="154" font-size="11" font-weight="700" text-anchor="middle" fill="#1F2A37">E-Bikes</text>
    <circle cx="195" cy="180" r="14" fill="#B45309" opacity="0.55" stroke="#B45309"/><text x="195" y="184" font-size="10" font-weight="700" text-anchor="middle" fill="#1F2A37">Zubehör</text>
    <circle cx="520" cy="350" r="19" fill="#0F766E" opacity="0.55" stroke="#0F766E"/><text x="520" y="354" font-size="9.5" font-weight="700" text-anchor="middle" fill="#1F2A37">City/Trek</text>
    <circle cx="455" cy="375" r="18" fill="#0F766E" opacity="0.55" stroke="#0F766E"/><text x="455" y="379" font-size="10" font-weight="700" text-anchor="middle" fill="#1F2A37">Teile</text>
    <circle cx="200" cy="405" r="12" fill="#B91C1C" opacity="0.55" stroke="#B91C1C"/><text x="200" y="408" font-size="9" font-weight="700" text-anchor="middle" fill="#1F2A37">Bekleid.</text>
  </g>

  <!-- Legende/Empfehlung -->
  <text x="32" y="498" font-size="12" fill="#475569"><tspan font-weight="700" fill="#15803D">Star:</tspan> investieren · <tspan font-weight="700" fill="#0F766E">Cash Cow:</tspan> ernten · <tspan font-weight="700" fill="#B45309">Question Mark:</tspan> selektiv · <tspan font-weight="700" fill="#B91C1C">Poor Dog:</tspan> desinvestieren</text>
  <text x="32" y="520" font-size="11.5" fill="#64748B">+ Break-even (Sicherheitsstrecke 7,1 %) · Investitionsrechnung (NPV/IRR) · Szenario · Soll-Ist-Brücke</text>
</svg>
