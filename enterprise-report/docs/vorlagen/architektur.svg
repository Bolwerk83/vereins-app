<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="520" fill="#F4F6F9"/>
  <text x="32" y="42" font-size="22" font-weight="700" fill="#1F2A37">Architektur · Schichten</text>
  <text x="32" y="66" font-size="13" fill="#64748B">Module sind nur Sichten auf einen gemeinsamen Kern — Datenquelle ist austauschbar (Mock ↔ MSSQL).</text>

  <g>
    <rect x="32" y="88" width="796" height="58" rx="10" fill="#0F766E"/>
    <text x="48" y="113" font-size="13" font-weight="700" fill="#FFFFFF">MODULE (Sichten)</text>
    <text x="48" y="133" font-size="12" fill="#CFE6E2">Berichtsbaum · Management Report · Self-Service BI · Maßnahmen · Querchecks · Instrumente · Wizard</text>

    <rect x="32" y="156" width="796" height="46" rx="10" fill="#E6F2F0" stroke="#0F766E"/>
    <text x="48" y="184" font-size="13" font-weight="700" fill="#0F766E">DESIGN-TOKENS  <tspan font-weight="400" fill="#1F2A37">— ein einheitliches Aussehen (Farben, Ampel, Typo)</tspan></text>

    <rect x="32" y="212" width="796" height="74" rx="10" fill="#1F2A37"/>
    <text x="48" y="237" font-size="13" font-weight="700" fill="#9DBFBA">KERN (Logik)</text>
    <text x="48" y="259" font-size="12" fill="#FFFFFF">reportTree (5 Ebenen) · kpiRegistry (KPIs + Abhängigkeiten) · ampel · rbac (Rechte)</text>
    <text x="48" y="277" font-size="12" fill="#FFFFFF">insights (Lagebewertung) · validierung (Querchecks) · instrumente · massnahmen · agentBoard</text>

    <rect x="32" y="296" width="796" height="46" rx="10" fill="#475569"/>
    <text x="48" y="324" font-size="13" font-weight="700" fill="#FFFFFF">DATA-PROVIDER  <tspan font-weight="400" fill="#CBD5E1">— eine Naht: mock | mssql · KI: heuristik | claude</tspan></text>

    <rect x="32" y="352" width="386" height="58" rx="10" fill="#FFFFFF" stroke="#D7DEE6"/>
    <text x="48" y="377" font-size="13" font-weight="700" fill="#1F2A37">MOCK (heute)</text>
    <text x="48" y="397" font-size="12" fill="#475569">Demo-Daten — läuft sofort ohne Backend</text>

    <rect x="442" y="352" width="386" height="58" rx="10" fill="#FFFFFF" stroke="#0F766E"/>
    <text x="458" y="377" font-size="13" font-weight="700" fill="#0F766E">MSSQL (Ziel)</text>
    <text x="458" y="397" font-size="12" fill="#475569">server/ → sql/&lt;kpi&gt;.kpi.sql → Microsoft SQL Server</text>
  </g>

  <!-- Pfeile -->
  <g fill="#94A3B8">
    <path d="M426 146 l8 0 -4 9 z"/><path d="M426 202 l8 0 -4 9 z"/>
    <path d="M426 286 l8 0 -4 9 z"/><path d="M426 342 l8 0 -4 9 z"/>
  </g>

  <text x="32" y="448" font-size="12.5" fill="#64748B">Umstieg auf echte Daten = ein Einzeiler (VITE_DATA_SOURCE=mssql) — Module bleiben unverändert.</text>
  <text x="32" y="470" font-size="12.5" fill="#64748B">Dein wiederkehrender Aufwand: nur SQL je Kennzahl nach festem Vertrag (periode, wert).</text>
</svg>
