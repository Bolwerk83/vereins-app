<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520" font-family="Segoe UI, Arial, sans-serif">
  <rect width="860" height="520" fill="#F4F6F9"/>
  <text x="32" y="40" font-size="20" font-weight="700" fill="#1F2A37">Self-Service BI · KI-Beirat (Controller-geführt)</text>

  <!-- Eingabe -->
  <rect x="32" y="60" width="560" height="96" rx="10" fill="#FFFFFF" stroke="#D7DEE6"/>
  <text x="48" y="84" font-size="12.5" fill="#64748B">Anforderung in natürlicher Sprache</text>
  <rect x="48" y="94" width="528" height="34" rx="6" fill="#F4F6F9" stroke="#D7DEE6"/>
  <text x="60" y="116" font-size="13" fill="#1F2A37">„Warum steigt der Umsatz, aber nicht das Ergebnis?"</text>
  <rect x="48" y="136" width="120" height="14" rx="7" fill="#E6F2F0"/><text x="108" y="147" font-size="9.5" fill="#0F766E" text-anchor="middle">Auswerten →</text>

  <!-- Beirat -->
  <rect x="608" y="60" width="220" height="312" rx="10" fill="#FFFFFF" stroke="#D7DEE6"/>
  <text x="624" y="84" font-size="12" font-weight="700" fill="#1F2A37">Beratender Beirat</text>
  <g font-size="11.5" fill="#475569">
    <circle cx="632" cy="104" r="9" fill="#0F766E"/><text x="628" y="108" font-size="9" fill="#fff">C</text><text x="650" y="108" fill="#1F2A37" font-weight="700">Controller-Lead</text>
    <text x="624" y="136">▸ Vertriebs-Berater</text>
    <text x="624" y="160">▸ Einkaufs-Berater</text>
    <text x="624" y="184">▸ Produktions-Berater</text>
    <text x="624" y="208">▸ Logistik-Berater</text>
    <text x="624" y="232">▸ Finanz-Berater</text>
  </g>
  <text x="624" y="270" font-size="10.5" fill="#64748B">Ergebnis &amp; Liquidität</text>
  <text x="624" y="286" font-size="10.5" fill="#64748B">im Blick (Unternehmensziel)</text>
  <rect x="624" y="300" width="120" height="16" rx="8" fill="#E6F2F0"/><text x="684" y="312" font-size="9.5" fill="#0F766E" text-anchor="middle">Engine: claude / heuristik</text>

  <!-- Ergebnis -->
  <rect x="32" y="172" width="560" height="316" rx="10" fill="#FFFFFF" stroke="#D7DEE6"/>
  <text x="48" y="196" font-size="13" font-weight="700" fill="#0F766E">Controller-Sicht</text>
  <text x="48" y="216" font-size="11.5" fill="#475569">Wachstum ist volumen-, nicht ertragsgetrieben — die Marge ist der Engpass.</text>

  <text x="48" y="244" font-size="10.5" fill="#64748B">BEFUNDE</text>
  <circle cx="54" cy="262" r="5" fill="#B91C1C"/><text x="66" y="266" font-size="11.5" fill="#1F2A37">Wareneinsatzquote 61,9 % — außerhalb des Ziels (über 60 %).</text>
  <circle cx="54" cy="284" r="5" fill="#B91C1C"/><text x="66" y="288" font-size="11.5" fill="#1F2A37">Lagerbestand 11,2 Mio € — deutlich über Ziel 7,5; +1,8 ggü. VJ.</text>
  <circle cx="54" cy="306" r="5" fill="#B45309"/><text x="66" y="310" font-size="11.5" fill="#1F2A37">DB-Quote 38,1 % — knapp unter Ziel 40 %.</text>

  <text x="48" y="340" font-size="10.5" fill="#64748B">MASSNAHMEN (mit Wirkung)</text>
  <rect x="48" y="350" width="528" height="30" rx="6" fill="#F4F6F9"/>
  <text x="60" y="369" font-size="11.5" fill="#1F2A37">Wareneinsatzquote senken — Hebel #1 · +0,5–0,8 Mio € DB · Aufwand mittel</text>
  <rect x="48" y="386" width="528" height="30" rx="6" fill="#F4F6F9"/>
  <text x="60" y="405" font-size="11.5" fill="#1F2A37">Überbestände abbauen — Hebel #2 · ≈ 3,5 Mio € Liquidität · Aufwand gering</text>
  <rect x="48" y="422" width="528" height="30" rx="6" fill="#F4F6F9"/>
  <text x="60" y="441" font-size="11.5" fill="#1F2A37">Online-Retouren auf 7 % senken — +0,8 Mio € Netto · Aufwand mittel</text>
  <text x="48" y="474" font-size="10.5" fill="#64748B">Stimmen des Beirats: Controller-Lead synthetisiert Vertrieb · Einkauf · Logistik · Finanzen</text>
</svg>
