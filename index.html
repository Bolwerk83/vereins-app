<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-capable" content="yes"/>
    <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
    <meta name="apple-mobile-web-app-title" content="Vereins-App"/>
    <meta name="theme-color" content="#16a34a"/>
    <meta name="format-detection" content="telephone=no"/>
    <link rel="icon" href="/icon-192.png"/>
    <link rel="manifest" href="/manifest.json"/>
    <link rel="apple-touch-icon" href="/icon-192.png"/>
    <title>Vereins-App</title>
    <!-- Awin Publisher · Verifizierung -->
    <meta name="awin-verification" content="bolwerk24-publisher"/>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        max-width: 100vw;
        touch-action: manipulation;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      #root {
        min-height: 100dvh;
        max-width: 100vw;
        overflow-x: hidden;
      }
      * {
        -webkit-tap-highlight-color: transparent;
        box-sizing: border-box;
      }
      input, select, textarea {
        font-size: 16px !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Service-Worker-Registrierung erfolgt in src/main.jsx (mit Build-Version
      // in der URL, damit jeder Deploy ein SW-Update + Reload erzwingt).
      // Prevent double-tap zoom on iOS
      let lastTouchEnd = 0;
      document.addEventListener('touchend', function(e) {
        const now = Date.now();
        if(now - lastTouchEnd <= 300) {
          e.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false });
    </script>
  </body>
</html>
